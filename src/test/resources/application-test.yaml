spring:
  application:
    name: order-service-test
  main:
    allow-bean-definition-overriding: true
  security:
    enabled: false
    oauth2:
      resourceserver:
        jwt:
          # Fake values so SecurityConfig can initialize without network calls.
          # The TestSecurityConfig provides a @Primary JwtDecoder mock for controller tests.
          issuer-uri: http://localhost/realms/test
          jwk-set-uri: http://localhost/realms/test/protocol/openid-connect/certs
      client:
        registration:
          internal-service-client:
            client-id: test-client-id
            client-secret: test-client-secret
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          internal-service-client:
            token-uri: http://localhost/realms/test/protocol/openid-connect/token
            authorization-uri: http://localhost/realms/test/protocol/openid-connect/auth
            jwk-set-uri: http://localhost/realms/test/protocol/openid-connect/certs
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.xml
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    topic:
      order-events: order-events-test
      payment-events: payment-events-test
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

keycloak:
  server-url: http://localhost/
  realm: test

user:
  service:
    url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  tracing:
    enabled: false
  prometheus:
    metrics:
      export:
        enabled: true

testcontainers:
  reuse:
    enable: false
